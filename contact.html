<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Megan Shaw</title>
  <link rel="stylesheet" href="css/portfolio.css">
  <link rel="stylesheet" href="https://use.typekit.net/rmd4nzf.css">
</head>
<body>

  <header class="sticky-header">
    <div class="header-container">
      <a href="index.html" class="logo">Megan Shaw.</a>
      <nav class="nav-links">
        <a href="resume.html">Resume</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="contact-wrapper">
      <h1 class="page-title">Let's Connect!</h1>

      <div class="contact-links">
        <a href="mailto:meggienshaw@gmail.com" class="contact-btn">
          Email Me
        </a>
           
        <button type="button" class="contact-btn tooltip-btn" onclick="copyNumber()">
          Call Me
          <span class="tooltip-text" id="copyTooltip">Number copied!</span>
        </button>
      </div>

      <div class="contact-divider">
        <span>or</span>
      </div>

      <form action="https://formspree.io/f/mzdydkro" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your Email" required>
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="How can I help?" required></textarea>
        </div>
        
        <button type="submit" class="contact-submit-btn">Send Message</button>
      </form>
    </div>

    <footer class="sticky-footer">
      <p>designed and coded by Megan Shaw</p>
    </footer>
  </main>

  <script src="js/portfolio.js"></script>
</body>
</html>
